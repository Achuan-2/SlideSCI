name: 🐛 错误报告
description: "报告软件中的错误或异常行为。"
title: "请输入Bug标题"
body:
  - type: markdown
    attributes:
      value: |
        插件为个人自用，开源只是分享，不等于我要浪费我的时间免费帮用户实现 ta 需要的功能。

        我需要的功能我会慢慢改进（打赏可以催更）；有些我觉得可以改进但现阶段不必要的功能，需要打赏才考虑实现（会标注“打赏”标签和所需金额）；我不需要的功能或实现成本极高的功能会直接关闭 issue，不予考虑。我没实现的功能欢迎有大佬来pr。

        请不要不经思考随意提大量 issue，因为这会打扰到我并浪费我的时间。

  - type: checkboxes
    attributes:
      label: 是否已 Star 本仓库？
      description: 未 Star 的用户 Issue 会被直接关闭。
      options:
        - label: 我已 Star 本仓库
          required: true
  - type: markdown
    attributes:
      value: |
        开源只是分享，不等于我要浪费我的时间免费帮用户实现 ta 需要的功能。

        我需要的功能我会慢慢改进（打赏可以催更）；有些我觉得可以改进但现阶段不必要的功能，需要打赏才考虑实现（会标注“打赏”标签和所需金额）；我不需要的功能或实现成本极高的功能会直接关闭 issue，不予考虑。

        请不要不经思考随意提大量 issue，因为这会打扰到我并浪费我的时间。
  - type: checkboxes
    attributes:
      label: 是否已搜索现有 Issue？
      description: |
        请先在现有 Issue 中搜索，避免重复提交相同问题。
      options:
        - label: 我已搜索过现有 Issue
          required: true
  - type: textarea
    attributes:
      label: 问题描述（必须）
      description: |
        请尽可能清晰地描述遇到的问题、出现频率及出现时间点。
    validations:
      required: true
  - type: textarea
    attributes:
      label: 期望结果（必须）
      description: |
        请清楚描述你期望得到的正确行为或结果。
    validations:
      required: true
  - type: textarea
    attributes:
      label: 版本与环境（必须）
      value: |
        - 版本：
        - 操作系统：
      render: markdown
    validations:
      required: true
  - type: textarea
    attributes:
      label: 其他信息（可选）
      description: |
        如有其他可帮助诊断的信息（网络状况、重现步骤、特殊配置等），请一并提供。
    validations:
      required: false
